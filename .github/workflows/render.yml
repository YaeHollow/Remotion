name: Render Remotion Video

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub release with the video'
        required: false
        default: 'false'

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Render video
        run: npm run build
        env:
          CI: true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: remotion-video
          path: out/video.mp4
          retention-days: 30

      - name: Create Release
        if: github.event_name == 'push' || github.event.inputs.release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          files: out/video.mp4
          tag_name: render-${{ github.run_number }}
          body: |
            Remotion Point Nemo Composition
            
            **Details:**
            - Branch: ${{ github.ref }}
            - Commit: ${{ github.sha }}
            - Timestamp: ${{ github.event.head_commit.timestamp }}
            
            Duration: 65 seconds | Resolution: 1920×1080 | Frame Rate: 30fps
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: '✅ Video render complete! Check the [Actions](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) or [Releases](https://github.com/${{ github.repository }}/releases) to download.'
            })
